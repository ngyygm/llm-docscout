# Reward variant: R_ratio (ours). reward = w_answer*answer + w_evidence*evidence
#                                        - gamma*(1 - efficiency_ratio) + termination
# efficiency_ratio = gold_tokens_in_context / total_read_tokens  (anti "read everything")
reward:
  name: ratio
  w_answer: 1.0
  w_evidence: 0.3
  evidence_source: read     # committed reads (READ/EXPAND); snippets don't count as evidence
  gamma_ratio: 1.0
  r_submit_bonus: 0.5
  r_nosubmit_penalty: -0.5
